name: Auto Update Typst Symbols

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-symbols:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install rust-script
        run: cargo install rust-script

      - name: Check for Updates and Run
        id: update_process
        run: |
          SCRIPT_PATH="scripts/typst_symbols.rs"

          LATEST_VERSION=$(python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("https://crates.io/api/v1/crates/typst", timeout=30) as response:
              data = json.load(response)

          print(data["crate"]["newest_version"])
          PY
          )

          CURRENT_VERSION=$(grep 'typst = "' $SCRIPT_PATH | head -n 1 | sed -E 's/.*typst = "([^"]+)".*/\1/')

          echo "Latest Version:  $LATEST_VERSION"
          echo "Current Version: $CURRENT_VERSION"

          if [ -z "$LATEST_VERSION" ] || [ -z "$CURRENT_VERSION" ]; then
            echo "Failed to determine typst versions." >&2
            exit 1
          fi

          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "Update detected! Upgrading from $CURRENT_VERSION to $LATEST_VERSION"

            sed -i "s/typst = \"[^\"]*\"/typst = \"$LATEST_VERSION\"/" $SCRIPT_PATH
            sed -i "s/typst-library = \"[^\"]*\"/typst-library = \"$LATEST_VERSION\"/" $SCRIPT_PATH

            echo "Running generation script..."
            rust-script $SCRIPT_PATH

            echo "updated=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Already up to date."
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.update_process.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update symbols to typst ${{ steps.update_process.outputs.version }}"
          branch: chore/update-typst-symbols
          base: main
          delete-branch: true
          title: "chore: update symbols to typst ${{ steps.update_process.outputs.version }}"
          body: |
            Auto-generated Typst symbol update.

            - Typst version: `${{ steps.update_process.outputs.version }}`
            - Regenerated `lua/math-conceal/conceal/math_symbols_typst.json`
            - Updated `scripts/typst_symbols.rs`
          add-paths: |
            lua/math-conceal/conceal/math_symbols_typst.json
            scripts/typst_symbols.rs
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
